server {
    listen 127.0.0.1:8080 default_server;
    server_name _;
    root /app/public;
    index index.php;

    client_max_body_size 10M;

    # Static assets
    location /static/ {
        alias /app/public/static/;
        expires 7d;
        access_log off;
    }

    # Deny access to hidden files and storage
    location ~ /\. {
        deny all;
    }

    # Serve uploaded images (read-only, no directory listing)
    location /storage/uploads/ {
        alias /app/storage/uploads/;
        autoindex off;
        expires 1d;
    }

    # Deny all other storage paths
    location /storage/ {
        deny all;
    }

    # ThinkPHP URL rewrite — pass pathinfo via ?s= parameter
    location / {
        try_files $uri $uri/ /index.php?s=$uri&$args;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }
}
